<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>День науки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
    :root {
        --color-bg: #111111;
        --color-card: #ffffff;
        --color-accent: #0b5394;
        --color-accent-hover: #083c6b;
        --color-success: #2e7d32;
        --color-danger: #b80000;
        --color-text: #222222;
        --shadow-large: 0 10px 30px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0; padding: 0;
        background-color: var(--color-bg);
        background-image: radial-gradient(circle at center, #2a2a2a 0%, #111111 100%);
        font-family: 'Montserrat', sans-serif;
        color: var(--color-text);
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        height: 100dvh; width: 100%;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden; 
    }

    #ui-layer {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        width: 100%; height: 100%; padding: 20px;
    }
    
    .card {
        background: var(--color-card); 
        padding: 1.5rem; 
        border-radius: 2rem;
        text-align: center; 
        width: 100%; max-width: 400px;
        box-shadow: var(--shadow-large);
        display: flex; flex-direction: column; 
        align-items: center; gap: 15px;
        position: relative;
    }

    /* Шапка картки для заголовка та лічильника */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding-bottom: 5px;
        gap: 10px;
    }

    .header-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        flex: 1;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f8f9fa;
        padding: 6px 12px 6px 6px;
        border-radius: 30px;
        border: 1px solid #e9ecef;
        flex-shrink: 0;
    }

    h1 {
        margin: 0; font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
        color: var(--color-text); letter-spacing: 0.5px; text-align: left;
    }

    .counter-container {
        position: relative;
        width: 40px; height: 40px;
        border-radius: 50%;
        background: #f0f4f8;
        display: flex; align-items: center; justify-content: center;
        border: 3px solid var(--color-accent);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1), 0 0 0 4px rgba(11, 83, 148, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .counter-container.pulse {
        transform: scale(1.15);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1), 0 0 0 6px rgba(11, 83, 148, 0.2);
    }

    #counter {
        font-size: 1.2rem; font-weight: 900; color: var(--color-accent);
        line-height: 1; margin-top: 2px;
    }

    .counter-label {
        font-size: 0.7rem; font-weight: 800; color: #555; 
        text-transform: uppercase; line-height: 1.1; text-align: left;
    }

    .subtitle {
        font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase;
    }

    /* Стилі для QR-коду */
    #qrcode-box {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 1.5rem;
        border: 1px solid #e9ecef;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
    }

    #qrcode {
        background: white;
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    
    #qrcode img {
        display: block;
        margin: 0 auto;
    }

    #status-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 5px 10px; border-radius: 20px;
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        background: #e0e0e0; color: #555;
        transition: all 0.3s ease;
    }

    #status-badge i { width: 12px; height: 12px; }
    
    .status-host { background: #e3f2fd !important; color: var(--color-accent) !important; }
    .status-client { background: #e8f5e9 !important; color: var(--color-success) !important; }
    .status-error { background: #ffebee !important; color: var(--color-danger) !important; }

    #team-container {
        display: none; width: 100%; margin-top: 5px; 
        padding: 12px; border-radius: 12px; font-size: 1.1rem; 
        font-weight: 800; text-transform: uppercase; letter-spacing: 1px; 
        transition: all 0.3s ease;
    }

    .btn-primary {
        background: var(--color-accent); 
        color: white; border: none; 
        padding: 1rem; width: 100%;
        font-size: 1rem; font-family: 'Montserrat', sans-serif; font-weight: 700;
        border-radius: 1rem; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; gap: 8px;
        box-shadow: 0 6px 15px rgba(11, 83, 148, 0.3); text-transform: uppercase;
        transition: transform 0.1s, background 0.2s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:hover { background: var(--color-accent-hover); }

</style>
</head>
<body>

<div id="ui-layer">
    <div class="card">
        
        <!-- Шапка: Заголовок, Статус та Лічильник -->
        <div class="card-header">
            <div class="header-left">
                <h1>Інтерактив</h1>
                <div id="status-badge">
                    <i data-lucide="loader-2" class="spin" style="animation: spin 1s linear infinite;"></i>
                    <span id="status-text">Підключення...</span>
                </div>
            </div>
            
            <div class="header-right">
                <div class="counter-container" id="counter-box">
                    <span id="counter">0</span>
                </div>
                <div class="counter-label">Осіб<br>у грі</div>
            </div>
        </div>

        <!-- Центральний блок: QR-код -->
        <div id="qrcode-box">
            <div id="qrcode"></div>
            <span class="subtitle">Скануйте, щоб приєднатись</span>
        </div>

        <!-- Блок команди -->
        <div id="team-container">
            <span id="team-name"></span>
        </div>

        <!-- Кнопка поширення -->
        <button class="btn-primary" onclick="shareLink()">
            <i data-lucide="share-2"></i> ЗАПРОСИТИ
        </button>
    </div>
</div>

<script>
    lucide.createIcons();

    // Системні налаштування
    const PING_INTERVAL = 1000;  // Частота пінгу (1 секунда)
    const TIMEOUT_LIMIT = 3000;  // Максимальний час очікування відповіді (3 секунди)
    
    // Налаштування команд
    const TEAMS =[
        { id: 'red', name: 'Червоні', bg: '#b80000', color: '#ffffff' },
        { id: 'white', name: 'Білі', bg: '#ffffff', color: '#222222', border: '2px solid #e0e0e0' },
        { id: 'black', name: 'Чорні', bg: '#000000', color: '#ffffff' },
        { id: 'blue', name: 'Сині', bg: '#0b5394', color: '#ffffff' }
    ];

    // Глобальні змінні
    let myPeer = null;
    let hostConnection = null;
    let clientConnections =[];
    let isHost = false;
    let currentCount = 0;
    let myTeam = null;

    let hostActivityInterval = null;
    let clientActivityInterval = null;
    let lastHostActivity = Date.now();

    const urlParams = new URLSearchParams(window.location.search);
    let roomString = urlParams.get('room') || window.location.hostname.replace(/[^a-zA-Z0-9]/g, '') || 'local';
    const GLOBAL_ROOM_ID = `webrtc-auto-room-${roomString}`;

    window.onload = () => {
        initNetwork();
        generateQR();
    };

    function generateQR() {
        const url = window.location.href;
        const qrcodeContainer = document.getElementById('qrcode');
        qrcodeContainer.innerHTML = ""; 
        new QRCode(qrcodeContainer, {
            text: url,
            width: 180,
            height: 180,
            colorDark : "#111111",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.L
        });
    }

    function initNetwork() {
        updateStatus("Пошук мережі...", "loading");
        
        // 1. Намагаємось зайняти головний ID (Стати Хостом)
        myPeer = new Peer(GLOBAL_ROOM_ID);

        myPeer.on('open', (id) => {
            isHost = true;
            updateStatus("Ви - Сервер (Хост)", "host");
            
            // Якщо хост не має команди (перший запуск), даємо йому першу
            if (!myTeam) {
                myTeam = TEAMS[0];
            }
            updateTeamUI(myTeam);
            
            updateCount(1); // Ми перші та єдині наразі
            setupHostLogic();
        });

        myPeer.on('error', (err) => {
            // ID вже зайнятий - стаємо Клієнтом
            if (err.type === 'unavailable-id') {
                isHost = false;
                myPeer.destroy();
                setTimeout(startAsClient, 500); 
            } else {
                updateStatus("Помилка з'єднання", "error");
                console.error(err);
            }
        });
    }

    // ==========================================
    // ЛОГІКА ХОСТА
    // ==========================================
    function setupHostLogic() {
        clearInterval(clientActivityInterval);

        myPeer.on('connection', (conn) => {
            clientConnections.push(conn);
            conn.lastActivity = Date.now();

            conn.on('open', () => {
                // Видача команди клієнту за принципом балансування (Round Robin)
                conn.team = getNextBalancedTeam();
                conn.send({ type: 'TEAM', value: conn.team });
                
                broadcastCount();
            });

            conn.on('data', (data) => {
                if (data.type === 'PONG') {
                    conn.lastActivity = Date.now();
                }
            });

            conn.on('close', () => { removeClient(conn); });
            conn.on('error', () => { removeClient(conn); });
        });

        // Активна перевірка життєдіяльності клієнтів
        clearInterval(hostActivityInterval);
        hostActivityInterval = setInterval(() => {
            if (!isHost) return;
            const now = Date.now();
            let droppedSomeone = false;

            clientConnections = clientConnections.filter(conn => {
                if (now - conn.lastActivity > TIMEOUT_LIMIT) {
                    if (conn.open) conn.close();
                    droppedSomeone = true;
                    return false;
                }
                if (conn.open) conn.send({ type: 'PING' });
                return true;
            });

            if (droppedSomeone) broadcastCount();
        }, PING_INTERVAL);
    }

    function removeClient(conn) {
        clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
        broadcastCount();
    }

    function broadcastCount() {
        const count = clientConnections.length + 1;
        updateCount(count);
        clientConnections.forEach(conn => {
            if (conn.open) conn.send({ type: 'COUNT', value: count });
        });
    }

    function getNextBalancedTeam() {
        // Аналізуємо кількість гравців в кожній команді для ідеального балансу
        const teamCounts = { 'red': 0, 'white': 0, 'black': 0, 'blue': 0 };
        
        if (myTeam) teamCounts[myTeam.id]++;
        
        clientConnections.forEach(c => {
            if (c.team) {
                teamCounts[c.team.id]++;
            }
        });

        let minTeam = TEAMS[0];
        let minCount = teamCounts[TEAMS[0].id];

        for (let i = 1; i < TEAMS.length; i++) {
            if (teamCounts[TEAMS[i].id] < minCount) {
                minTeam = TEAMS[i];
                minCount = teamCounts[TEAMS[i].id];
            }
        }
        return minTeam;
    }

    // ==========================================
    // ЛОГІКА КЛІЄНТА
    // ==========================================
    function startAsClient() {
        clearInterval(hostActivityInterval);
        myPeer = new Peer();

        myPeer.on('open', (id) => {
            hostConnection = myPeer.connect(GLOBAL_ROOM_ID, { reliable: true });

            hostConnection.on('open', () => {
                updateStatus("Онлайн", "client");
                lastHostActivity = Date.now();
                
                // Активна перевірка життєдіяльності хоста
                clearInterval(clientActivityInterval);
                clientActivityInterval = setInterval(() => {
                    if (Date.now() - lastHostActivity > TIMEOUT_LIMIT) {
                        handleHostDrop();
                    }
                }, 1000);
            });

            hostConnection.on('data', (data) => {
                if (data.type === 'COUNT') {
                    updateCount(data.value);
                } else if (data.type === 'TEAM') {
                    myTeam = data.value;
                    updateTeamUI(myTeam);
                } else if (data.type === 'PING') {
                    lastHostActivity = Date.now();
                    hostConnection.send({ type: 'PONG' });
                }
            });

            hostConnection.on('close', () => { handleHostDrop(); });
            hostConnection.on('error', () => { handleHostDrop(); });
        });

        myPeer.on('error', (err) => {
            handleHostDrop();
        });
    }

    function handleHostDrop() {
        if(isHost) return; 

        clearInterval(clientActivityInterval);
        updateStatus("Оновлення...", "loading");
        
        if (hostConnection) {
            hostConnection.close();
            hostConnection = null;
        }
        if (myPeer) {
            myPeer.destroy();
            myPeer = null;
        }

        // Рандомна затримка перед спробою стати новим хостом (Leader Election)
        const randomBackoff = Math.floor(Math.random() * 2000) + 500;
        setTimeout(() => {
            initNetwork();
        }, randomBackoff);
    }

    // ==========================================
    // UI ФУНКЦІЇ
    // ==========================================
    function updateCount(newCount) {
        if (newCount !== currentCount) {
            currentCount = newCount;
            const counterEl = document.getElementById('counter');
            const boxEl = document.getElementById('counter-box');
            
            counterEl.innerText = currentCount;
            
            boxEl.classList.remove('pulse');
            void boxEl.offsetWidth; 
            boxEl.classList.add('pulse');
            setTimeout(() => boxEl.classList.remove('pulse'), 300);
        }
    }

    function updateTeamUI(team) {
        if (!team) return;
        const container = document.getElementById('team-container');
        const nameEl = document.getElementById('team-name');
        
        container.style.display = 'block';
        container.style.backgroundColor = team.bg;
        container.style.color = team.color;
        
        if (team.border) {
            container.style.border = team.border;
        } else {
            container.style.border = '2px solid transparent'; // Щоб не стрибав розмір
        }
        
        nameEl.innerText = team.name;
    }

    function updateStatus(text, type) {
        const badge = document.getElementById('status-badge');
        const span = document.getElementById('status-text');
        
        badge.className = '';
        span.innerText = text;

        if (type === 'loading') {
            badge.innerHTML = `<i data-lucide="loader-2" style="animation: spin 1s linear infinite;"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'host') {
            badge.classList.add('status-host');
            badge.innerHTML = `<i data-lucide="server"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'client') {
            badge.classList.add('status-client');
            badge.innerHTML = `<i data-lucide="wifi"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'error') {
            badge.classList.add('status-error');
            badge.innerHTML = `<i data-lucide="alert-triangle"></i> <span id="status-text">${text}</span>`;
        }
        lucide.createIcons();
    }

    async function shareLink() {
        const link = window.location.href;
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Live Counter',
                    text: 'Приєднуйся до моєї кімнати!',
                    url: link
                });
            } catch (err) { }
        } else {
            navigator.clipboard.writeText(link);
            const btn = document.querySelector('.btn-primary');
            const origHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check"></i> СКОПІЙОВАНО`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = origHtml;
                lucide.createIcons();
            }, 2000);
        }
    }
</script>
</body>
</html>
