<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Live Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Лише необхідні бібліотеки: PeerJS для WebRTC та Lucide для іконок -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
    :root {
        --color-bg: #111111;
        --color-card: #ffffff;
        --color-accent: #0b5394;
        --color-accent-hover: #083c6b;
        --color-success: #2e7d32;
        --color-danger: #b80000;
        --color-text: #222222;
        --shadow-large: 0 10px 30px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0; padding: 0;
        background-color: var(--color-bg);
        background-image: radial-gradient(circle at center, #2a2a2a 0%, #111111 100%);
        font-family: 'Montserrat', sans-serif;
        color: var(--color-text);
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        height: 100dvh; width: 100%;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden; 
    }

    /* --- UI ELEMENTS --- */
    #ui-layer {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        width: 100%; height: 100%; padding: 20px;
    }
    
    .card {
        background: var(--color-card); 
        padding: 2rem; 
        border-radius: 2rem;
        text-align: center; 
        width: 100%; max-width: 400px;
        box-shadow: var(--shadow-large);
        display: flex; flex-direction: column; 
        align-items: center; gap: 20px;
        position: relative;
    }

    h1 {
        margin: 0; font-size: 1.5rem; font-weight: 800; text-transform: uppercase;
        color: var(--color-text); letter-spacing: 1px;
    }

    /* --- COUNTER DISPLAY --- */
    .counter-container {
        position: relative;
        width: 200px; height: 200px;
        border-radius: 50%;
        background: #f0f4f8;
        display: flex; align-items: center; justify-content: center;
        border: 8px solid var(--color-accent);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 0 0 10px rgba(11, 83, 148, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .counter-container.pulse {
        transform: scale(1.05);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 0 0 20px rgba(11, 83, 148, 0.2);
    }

    #counter {
        font-size: 5rem; font-weight: 900; color: var(--color-accent);
        line-height: 1; margin-top: 5px;
    }

    .subtitle {
        font-size: 0.9rem; font-weight: 600; color: #666; text-transform: uppercase;
    }

    /* --- NETWORK STATUS --- */
    #status-badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 20px;
        font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        background: #e0e0e0; color: #555;
        transition: all 0.3s ease;
    }

    #status-badge i { width: 14px; height: 14px; }
    
    .status-host { background: #e3f2fd !important; color: var(--color-accent) !important; }
    .status-client { background: #e8f5e9 !important; color: var(--color-success) !important; }
    .status-error { background: #ffebee !important; color: var(--color-danger) !important; }

    /* --- ACTION BUTTONS --- */
    .btn-primary {
        background: var(--color-accent); 
        color: white; border: none; 
        padding: 1rem; width: 100%;
        font-size: 1.1rem; font-family: 'Montserrat', sans-serif; font-weight: 700;
        border-radius: 1rem; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; gap: 10px;
        box-shadow: 0 6px 15px rgba(11, 83, 148, 0.3); text-transform: uppercase;
        transition: transform 0.1s, background 0.2s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:hover { background: var(--color-accent-hover); }

</style>
</head>
<body>

<div id="ui-layer">
    <div class="card">
        <h1>Онлайн Гравці</h1>
        
        <div id="status-badge">
            <i data-lucide="loader-2" class="spin" style="animation: spin 1s linear infinite;"></i>
            <span id="status-text">Підключення...</span>
        </div>

        <div class="counter-container" id="counter-box">
            <span id="counter">0</span>
        </div>
        <span class="subtitle">Осіб на сторінці</span>

        <button class="btn-primary" onclick="shareLink()">
            <i data-lucide="share-2"></i> ЗАПРОСИТИ
        </button>
    </div>
</div>

<script>
    // Ініціалізація іконок
    lucide.createIcons();

    // Глобальні змінні
    let myPeer = null;
    let hostConnection = null;
    let clientConnections =[];
    let isHost = false;
    let currentCount = 0;

    // Створюємо унікальний ідентифікатор кімнати для цього сайту/домену.
    // Якщо хочете різні кімнати, можна додати параметри URL (?room=123)
    const urlParams = new URLSearchParams(window.location.search);
    let roomString = urlParams.get('room') || window.location.hostname.replace(/[^a-zA-Z0-9]/g, '') || 'local';
    const GLOBAL_ROOM_ID = `webrtc-auto-room-${roomString}`;

    // Запуск при завантаженні
    window.onload = () => {
        initNetwork();
    };

    function initNetwork() {
        updateStatus("Пошук мережі...", "loading");
        
        // КРОК 1: Спробуємо стати Хостом (головним сервером для цієї сторінки)
        myPeer = new Peer(GLOBAL_ROOM_ID);

        myPeer.on('open', (id) => {
            // Якщо ми успішно зайняли цей ID, значить ми перші на сторінці - ми ХОСТ!
            isHost = true;
            updateStatus("Ви - Сервер (Хост)", "host");
            updateCount(1); // Спочатку ми одні
            setupHostLogic();
        });

        myPeer.on('error', (err) => {
            // Якщо ID вже зайнятий - значить Хост вже існує, стаємо Клієнтом
            if (err.type === 'unavailable-id') {
                isHost = false;
                myPeer.destroy();
                setTimeout(startAsClient, 500); // Невелика затримка для безпечного очищення
            } else {
                updateStatus("Помилка з'єднання", "error");
                console.error(err);
            }
        });
    }

    // ==========================================
    // ЛОГІКА ХОСТА (Головний вузол)
    // ==========================================
    function setupHostLogic() {
        myPeer.on('connection', (conn) => {
            clientConnections.push(conn);
            conn.lastActivity = Date.now();

            conn.on('open', () => {
                broadcastCount(); // Оновлюємо кількість всім
            });

            conn.on('data', (data) => {
                if (data.type === 'PONG') {
                    conn.lastActivity = Date.now();
                }
            });

            conn.on('close', () => {
                removeClient(conn);
            });

            conn.on('error', () => {
                removeClient(conn);
            });
        });

        // HEARTBEAT: Кожні 3 секунди перевіряємо, чи клієнти ще живі
        setInterval(() => {
            if (!isHost) return;
            const now = Date.now();
            let droppedSomeone = false;

            clientConnections = clientConnections.filter(conn => {
                // Якщо клієнт не відповідає більше 10 секунд - видаляємо його
                if (now - conn.lastActivity > 10000) {
                    if (conn.open) conn.close();
                    droppedSomeone = true;
                    return false;
                }
                // Відправляємо Ping
                if (conn.open) conn.send({ type: 'PING' });
                return true;
            });

            if (droppedSomeone) broadcastCount();
        }, 3000);
    }

    function removeClient(conn) {
        clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
        broadcastCount();
    }

    function broadcastCount() {
        const count = clientConnections.length + 1; // 1 (Хост) + кількість клієнтів
        updateCount(count);
        clientConnections.forEach(conn => {
            if (conn.open) conn.send({ type: 'COUNT', value: count });
        });
    }

    // ==========================================
    // ЛОГІКА КЛІЄНТА (Підключений гравець)
    // ==========================================
    function startAsClient() {
        myPeer = new Peer(); // Отримуємо випадковий ID для себе

        myPeer.on('open', (id) => {
            hostConnection = myPeer.connect(GLOBAL_ROOM_ID, { reliable: true });

            hostConnection.on('open', () => {
                updateStatus("Підключено", "client");
            });

            hostConnection.on('data', (data) => {
                if (data.type === 'COUNT') {
                    updateCount(data.value);
                } else if (data.type === 'PING') {
                    hostConnection.send({ type: 'PONG' });
                }
            });

            hostConnection.on('close', () => {
                handleHostDrop();
            });

            hostConnection.on('error', () => {
                handleHostDrop();
            });
        });

        myPeer.on('error', (err) => {
            console.error("Client Peer Error:", err);
            handleHostDrop();
        });
    }

    function handleHostDrop() {
        updateStatus("Перепідключення...", "loading");
        if (myPeer) myPeer.destroy();
        
        // Якщо хост відключився, усі клієнти чекають випадковий час (від 0.5с до 2.5с) 
        // і намагаються стати новим Хостом. Той хто першим підніметься - стане Хостом,
        // інші знову стануть Клієнтами і підключаться до нього.
        const randomBackoff = Math.floor(Math.random() * 2000) + 500;
        setTimeout(() => {
            initNetwork();
        }, randomBackoff);
    }

    // ==========================================
    // UI ФУНКЦІЇ
    // ==========================================
    function updateCount(newCount) {
        if (newCount !== currentCount) {
            currentCount = newCount;
            const counterEl = document.getElementById('counter');
            const boxEl = document.getElementById('counter-box');
            
            counterEl.innerText = currentCount;
            
            // Анімація пульсації при зміні числа
            boxEl.classList.remove('pulse');
            void boxEl.offsetWidth; // Тригер reflow для перезапуску CSS анімації
            boxEl.classList.add('pulse');
            setTimeout(() => boxEl.classList.remove('pulse'), 300);
        }
    }

    function updateStatus(text, type) {
        const badge = document.getElementById('status-badge');
        const span = document.getElementById('status-text');
        
        badge.className = '';
        span.innerText = text;

        if (type === 'loading') {
            badge.innerHTML = `<i data-lucide="loader-2" style="animation: spin 1s linear infinite;"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'host') {
            badge.classList.add('status-host');
            badge.innerHTML = `<i data-lucide="server"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'client') {
            badge.classList.add('status-client');
            badge.innerHTML = `<i data-lucide="wifi"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'error') {
            badge.classList.add('status-error');
            badge.innerHTML = `<i data-lucide="alert-triangle"></i> <span id="status-text">${text}</span>`;
        }
        lucide.createIcons();
    }

    async function shareLink() {
        const link = window.location.href;
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Live Counter',
                    text: 'Приєднуйся до моєї кімнати!',
                    url: link
                });
            } catch (err) {
                console.error("Помилка Share API", err);
            }
        } else {
            // Фолбек: просто копіюємо в буфер обміну
            navigator.clipboard.writeText(link);
            
            const btn = document.querySelector('.btn-primary');
            const origHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check"></i> СКОПІЙОВАНО`;
            lucide.createIcons();
            
            setTimeout(() => {
                btn.innerHTML = origHtml;
                lucide.createIcons();
            }, 2000);
        }
    }
</script>
</body>
</html>
