<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>День науки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
    :root {
        --color-bg: #111111;
        --color-card: #ffffff;
        --color-accent: #0b5394;
        --color-accent-hover: #083c6b;
        --color-success: #2e7d32;
        --color-danger: #b80000;
        --color-text: #222222;
        --shadow-large: 0 10px 40px rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0; padding: 0;
        background-color: var(--color-bg);
        background-image: radial-gradient(circle at center, #2a2a2a 0%, #111111 100%);
        font-family: 'Montserrat', sans-serif;
        color: var(--color-text);
        
        /* Захист від обрізання: дозволяє контенту скролитись, якщо екран надто малий */
        min-height: 100dvh;
        width: 100%;
        display: flex; align-items: center; justify-content: center;
        overflow-x: hidden;
        overflow-y: auto;
    }

    /* Мінімалістичний індикатор версії в лівому верхньому кутку */
    .version-tag {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.3);
        z-index: 100;
        letter-spacing: 0.5px;
        pointer-events: none;
    }

    #ui-layer {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        width: 100%; min-height: 100dvh; 
        padding: clamp(10px, 3vh, 20px);
        position: relative;
    }
    
    .card {
        background: var(--color-card); 
        /* Стискаємо відступи по вертикалі на малих екранах */
        padding: clamp(15px, 3vh, 24px); 
        border-radius: clamp(1.2rem, 5vw, 1.8rem);
        text-align: center; 
        width: 100%; 
        max-width: 360px; /* Трохи вужче для кращої посадки на мобільних */
        box-shadow: var(--shadow-large);
        display: flex; flex-direction: column; 
        align-items: center; 
        gap: clamp(10px, 2.5vh, 16px);
        position: relative;
        z-index: 10;
    }

    /* Шапка картки для заголовка та лічильника */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding-bottom: 2px;
        gap: 10px;
    }

    .header-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: clamp(4px, 1vh, 6px);
        flex: 1;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f8f9fa;
        padding: 5px 10px 5px 5px;
        border-radius: 30px;
        border: 1px solid #e9ecef;
        flex-shrink: 0;
    }

    h1 {
        margin: 0; font-size: clamp(1.05rem, 4.5vw, 1.25rem); font-weight: 800; text-transform: uppercase;
        color: var(--color-text); letter-spacing: 0.5px; text-align: left; line-height: 1.1;
    }

    .counter-container {
        position: relative;
        width: clamp(34px, 9vw, 40px); height: clamp(34px, 9vw, 40px);
        border-radius: 50%;
        background: #f0f4f8;
        display: flex; align-items: center; justify-content: center;
        border: 3px solid var(--color-accent);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1), 0 0 0 4px rgba(11, 83, 148, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .counter-container.pulse {
        transform: scale(1.15);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1), 0 0 0 6px rgba(11, 83, 148, 0.2);
    }

    #counter {
        font-size: clamp(1.05rem, 4vw, 1.2rem); font-weight: 900; color: var(--color-accent);
        line-height: 1; margin-top: 2px;
    }

    .counter-label {
        font-size: clamp(0.55rem, 2.5vw, 0.65rem); font-weight: 800; color: #555; 
        text-transform: uppercase; line-height: 1.1; text-align: left;
    }

    .subtitle {
        font-size: clamp(0.7rem, 2.5vh, 0.8rem); font-weight: 700; color: #666; text-transform: uppercase;
        margin-top: -2px;
    }

    /* Стилі для подвійного QR-коду */
    #qrcode-box {
        background: #f8f9fa;
        padding: clamp(10px, 2.5vh, 15px);
        border-radius: clamp(1rem, 4vw, 1.2rem);
        border: 1px solid #e9ecef;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(6px, 1.5vh, 10px);
        width: 100%;
    }

    .qr-row {
        display: flex;
        gap: clamp(8px, 2vw, 12px);
        width: 100%;
        justify-content: center;
    }

    .qr-item {
        background: white;
        padding: clamp(6px, 1.5vh, 10px);
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(4px, 1vh, 8px);
        flex: 1; 
        width: 50%;
    }

    .qr-item-title {
        font-size: clamp(0.55rem, 2.2vw, 0.65rem);
        font-weight: 800;
        color: var(--color-accent);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .qr-render {
        width: 100%;
        display: flex;
        justify-content: center;
    }
    
    /* Максимальний розмір QR-коду підлаштовується, щоб два коди вмістилися поруч */
    .qr-render img, .qr-render canvas {
        display: block;
        margin: 0 auto;
        width: 100% !important;
        max-width: clamp(80px, 18vh, 130px);
        height: auto !important;
    }

    #status-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 4px 8px; border-radius: 20px;
        font-size: clamp(0.6rem, 2.5vw, 0.65rem); font-weight: 700; text-transform: uppercase;
        background: #e0e0e0; color: #555;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    #status-badge i { width: 12px; height: 12px; }
    
    .status-host { background: #e3f2fd !important; color: var(--color-accent) !important; }
    .status-client { background: #e8f5e9 !important; color: var(--color-success) !important; }
    .status-error { background: #ffebee !important; color: var(--color-danger) !important; }

    #team-container {
        display: none; 
        align-items: center; justify-content: center; gap: 8px;
        width: 100%; margin-top: 0; 
        padding: clamp(10px, 2vh, 14px); 
        border-radius: 1rem; 
        font-size: clamp(0.9rem, 3.5vw, 1rem); 
        font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; 
        transition: all 0.3s ease;
    }

    #team-container i, .btn-primary i {
        width: clamp(16px, 4vw, 20px); height: clamp(16px, 4vw, 20px);
    }

    .team-counter-badge {
        background: rgba(127, 127, 127, 0.25);
        color: inherit;
        border-radius: 50%;
        width: clamp(24px, 7vw, 28px); height: clamp(24px, 7vw, 28px);
        display: flex; align-items: center; justify-content: center;
        font-size: clamp(0.8rem, 3vw, 0.9rem); font-weight: 900;
        border: 1px solid rgba(127, 127, 127, 0.3);
    }

    #host-controls {
        display: none; 
        flex-direction: column; align-items: center; gap: clamp(6px, 1.5vh, 10px);
        width: 100%; margin-top: 0;
        padding: clamp(10px, 2vh, 15px); 
        background: #f8f9fa; border-radius: 1rem;
        border: 1px solid #e9ecef;
    }

    .host-controls-title {
        font-size: clamp(0.7rem, 2.5vw, 0.8rem); font-weight: 700; color: #666; text-transform: uppercase;
        display: flex; align-items: center; justify-content: center;
    }

    /* Стилі для режиму АВТО */
    #auto-badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        font-size: clamp(0.55rem, 2vw, 0.65rem);
        font-weight: 800;
        background: #e3f2fd;
        color: var(--color-accent);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    #auto-badge.inactive {
        background: #f1f3f5;
        color: #adb5bd;
    }
    
    #auto-badge.inactive:hover {
        background: #e9ecef;
        color: #6c757d;
    }

    .host-controls-btns {
        display: flex; gap: 8px; width: 100%;
    }

    .btn-team-limit {
        flex: 1; padding: clamp(6px, 1.5vh, 10px) 0; border: 2px solid var(--color-accent);
        border-radius: 0.8rem; background: transparent; color: var(--color-accent);
        font-size: clamp(0.9rem, 3.5vw, 1rem); font-family: 'Montserrat', sans-serif; font-weight: 800; 
        cursor: pointer; transition: all 0.2s;
    }

    .btn-team-limit.active {
        background: var(--color-accent); color: white;
    }

    @keyframes auto-glow {
        0% { box-shadow: 0 0 2px rgba(11, 83, 148, 0.2); }
        50% { box-shadow: 0 0 12px rgba(11, 83, 148, 0.6); }
        100% { box-shadow: 0 0 2px rgba(11, 83, 148, 0.2); }
    }

    .btn-team-limit.auto-highlight {
        animation: auto-glow 2s infinite;
    }

    .btn-team-limit:active { transform: scale(0.95); }

    .btn-primary {
        background: var(--color-accent); 
        color: white; border: none; 
        padding: clamp(10px, 2.5vh, 15px); width: 100%;
        font-size: clamp(0.9rem, 3.5vw, 1.05rem); font-family: 'Montserrat', sans-serif; font-weight: 800;
        border-radius: 1rem; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; gap: 8px;
        box-shadow: 0 6px 15px rgba(11, 83, 148, 0.3); text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: transform 0.1s, background 0.2s;
    }
    
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:hover { background: var(--color-accent-hover); }

</style>
</head>
<body>

<div class="version-tag">v2.1</div>

<div id="ui-layer">
    <div class="card">
        
        <!-- Шапка: Заголовок, Статус та Лічильник -->
        <div class="card-header">
            <div class="header-left">
                <h1>Інтерактив</h1>
                <div id="status-badge">
                    <i data-lucide="loader-2" class="spin" style="animation: spin 1s linear infinite;"></i>
                    <span id="status-text">Підключення...</span>
                </div>
            </div>
            
            <div class="header-right">
                <div class="counter-container" id="counter-box">
                    <span id="counter">0</span>
                </div>
                <div class="counter-label">Осіб<br>у грі</div>
            </div>
        </div>

        <!-- Центральний блок: 2 QR-коди -->
        <div id="qrcode-box">
            <div class="qr-row">
                <div class="qr-item">
                    <span class="qr-item-title">Кімната</span>
                    <div id="qrcode-url" class="qr-render"></div>
                </div>
                <div class="qr-item">
                    <span class="qr-item-title">Мій ID</span>
                    <div id="qrcode-id" class="qr-render"></div>
                </div>
            </div>
            <span class="subtitle">Скануйте, щоб приєднатись</span>
        </div>

        <!-- Блок команди -->
        <div id="team-container">
            <i data-lucide="users"></i>
            <span id="team-name"></span>
            <div class="team-counter-badge">
                <span id="team-counter">0</span>
            </div>
        </div>

        <!-- Панель керування хоста -->
        <div id="host-controls">
            <div class="host-controls-title">
                Кількість команд 
                <span id="auto-badge" onclick="setAutoMode()">АВТО</span>
            </div>
            <div class="host-controls-btns">
                <button class="btn-team-limit" id="btn-limit-2" onclick="setTeamLimit(2, false)">2</button>
                <button class="btn-team-limit" id="btn-limit-3" onclick="setTeamLimit(3, false)">3</button>
                <button class="btn-team-limit active" id="btn-limit-4" onclick="setTeamLimit(4, false)">4</button>
            </div>
        </div>

        <!-- Кнопка поширення -->
        <button class="btn-primary" onclick="shareLink()">
            <i data-lucide="share-2"></i> ЗАПРОСИТИ
        </button>
    </div>
</div>

<script>
    lucide.createIcons();

    // Системні налаштування (Прискорені для миттєвої реакції)
    const PING_INTERVAL = 400;  
    const TIMEOUT_LIMIT = 1500; 
    const MAX_SLOTS = 20;       
    
    // Налаштування команд
    const TEAMS =[
        { id: 'red', name: 'Червоні', bg: '#b80000', color: '#ffffff' },
        { id: 'white', name: 'Білі', bg: '#ffffff', color: '#222222', border: '2px solid #e0e0e0' },
        { id: 'black', name: 'Чорні', bg: '#000000', color: '#ffffff' },
        { id: 'blue', name: 'Сині', bg: '#0b5394', color: '#ffffff' }
    ];

    // ==========================================
    // СИСТЕМА УНІКАЛЬНОЇ ІДЕНТИФІКАЦІЇ
    // ==========================================
    function getDeviceUID() {
        let uid = localStorage.getItem('app_device_uid');
        if (!uid) {
            const vendor = navigator.vendor || '';
            const ua = navigator.userAgent || '';
            const rand = Math.random().toString(36).substring(2);
            const time = Date.now().toString();
            
            const raw = vendor + ua + rand + time;
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            
            uid = 'uid_' + Math.abs(hash).toString(16) + '_' + rand;
            localStorage.setItem('app_device_uid', uid);
        }
        return uid;
    }
    const MY_CLIENT_ID = getDeviceUID();

    // Глобальні змінні мережі
    let myPeer = null;
    let hostConnection = null;
    let isHost = false;
    let currentSlot = 0;
    
    // МАПА УНІКАЛЬНИХ КЛІЄНТІВ 
    let activeClientsMap = new Map(); 
    
    // Глобальні змінні гри
    let currentCount = 0;
    let myTeam = null;
    let activeTeamLimit = 2; // Буде переписано автобалансиром
    let isAutoTeamLimit = true; // За замовчуванням увімкнено розумний розподіл

    let hostActivityInterval = null;
    let clientActivityInterval = null;
    let mergeInterval = null; 
    let lastHostActivity = Date.now();
    let isReconnecting = false;

    const urlParams = new URLSearchParams(window.location.search);
    let roomString = urlParams.get('room') || window.location.hostname.replace(/[^a-zA-Z0-9]/g, '') || 'local';
    const GLOBAL_ROOM_ID = `webrtc-auto-room-${roomString}`;

    window.onload = () => {
        initNetwork(0);
        generateQR();
    };

    function generateQR() {
        const url = window.location.href;
        
        // QR-код для посилання (Кімната)
        const qrcodeUrlContainer = document.getElementById('qrcode-url');
        qrcodeUrlContainer.innerHTML = ""; 
        new QRCode(qrcodeUrlContainer, {
            text: url,
            width: 180,
            height: 180,
            colorDark : "#111111",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.L
        });

        // QR-код для унікального ідентифікатора (Мій ID)
        const qrcodeIdContainer = document.getElementById('qrcode-id');
        qrcodeIdContainer.innerHTML = ""; 
        new QRCode(qrcodeIdContainer, {
            text: MY_CLIENT_ID,
            width: 180,
            height: 180,
            colorDark : "#111111",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.L
        });
    }

    // ==========================================
    // ЛОГІКА АВТОМАТИЧНОГО РОЗПОДІЛУ
    // ==========================================
    function getBestTeamLimit(n) {
        if (n < 4) return 2; // Якщо мало людей - 2 команди
        let bestK = 2;
        let minRem = Infinity;
        
        // Перевіряємо розподіл для 4, 3 та 2 команд
        for (let k = 4; k >= 2; k--) {
            if (n / k < 2) continue; // Намагаємось зберегти мінімум 2 людини в команді
            let rem = n % k;
            
            if (rem === 0) return k; // Знайдено ідеальний розподіл! (без залишку)
            
            if (rem < minRem) {
                minRem = rem;
                bestK = k; // Зберігаємо як "найкращий компроміс" (для спірних чисел)
            }
        }
        return bestK;
    }

    // ==========================================
    // СИСТЕМА МІГРАЦІЇ ХОСТА ТА СЛОТІВ
    // ==========================================
    function initNetwork(slot = 0) {
        if (slot > MAX_SLOTS) {
            updateStatus("Перепідключення...", "error");
            setTimeout(() => initNetwork(0), 2000); 
            return;
        }

        currentSlot = slot;
        const targetRoomId = `${GLOBAL_ROOM_ID}-s${slot}`;

        clearInterval(hostActivityInterval);
        clearInterval(clientActivityInterval);
        clearInterval(mergeInterval);
        
        if (myPeer) {
            myPeer.destroy();
            myPeer = null;
        }
        
        updateStatus("Пошук мережі...", "loading");
        
        // КРОК 1: Намагаємось стати ХОСТОМ у поточному слоті
        myPeer = new Peer(targetRoomId);

        // БЕЗШОВНЕ ВІДНОВЛЕННЯ
        myPeer.on('disconnected', () => {
            if (myPeer && !myPeer.destroyed && !myPeer.isReconnecting) {
                myPeer.isReconnecting = true;
                setTimeout(() => {
                    if (myPeer && !myPeer.destroyed) myPeer.reconnect();
                    myPeer.isReconnecting = false;
                }, 500);
            }
        });

        myPeer.on('open', (id) => {
            isHost = true;
            isReconnecting = false;
            activeClientsMap.clear();
            updateStatus("Ви - хост", "host");
            
            if (isAutoTeamLimit) {
                activeTeamLimit = getBestTeamLimit(1); 
            }

            if (!myTeam || TEAMS.indexOf(myTeam) >= activeTeamLimit) {
                myTeam = TEAMS[0];
            }
            updateTeamUI(myTeam);
            
            setupHostLogic();
            broadcastCount(); 
        });

        myPeer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                checkIfHostAliveAndConnect(targetRoomId, slot);
            } else {
                updateStatus("Помилка з'єднання", "error");
                setTimeout(() => initNetwork(slot), 1000);
            }
        });
    }

    function checkIfHostAliveAndConnect(targetRoomId, slot) {
        if (myPeer) myPeer.destroy();
        myPeer = new Peer(); 

        myPeer.on('disconnected', () => {
            if (myPeer && !myPeer.destroyed && !myPeer.isReconnecting) {
                myPeer.isReconnecting = true;
                setTimeout(() => {
                    if (myPeer && !myPeer.destroyed) myPeer.reconnect();
                    myPeer.isReconnecting = false;
                }, 500);
            }
        });

        myPeer.on('open', (id) => {
            let connectionResolved = false;
            hostConnection = myPeer.connect(targetRoomId, { reliable: true });

            const ghostTimeout = setTimeout(() => {
                if (!connectionResolved) {
                    connectionResolved = true;
                    if (hostConnection) hostConnection.close();
                    initNetwork(slot + 1); 
                }
            }, 1000); 

            hostConnection.on('open', () => {
                if (connectionResolved) return; 
                connectionResolved = true;
                clearTimeout(ghostTimeout);
                
                isHost = false;
                setupClientLogic();
            });

            hostConnection.on('error', (err) => {
                if (connectionResolved) return;
                connectionResolved = true;
                clearTimeout(ghostTimeout);
                initNetwork(slot + 1); 
            });
        });

        myPeer.on('error', (err) => {
            setTimeout(() => initNetwork(slot), 1000);
        });
    }

    // ==========================================
    // ЛОГІКА ХОСТА
    // ==========================================
    function setupHostLogic() {
        document.getElementById('host-controls').style.display = 'flex';
        updateHostControlsUI();

        // СИСТЕМА ЗЛИТТЯ КІМНАТ (Room Merger)
        if (currentSlot > 0) {
            mergeInterval = setInterval(() => {
                if (!isHost) return;
                const checkPeer = new Peer();
                checkPeer.on('open', () => {
                    const conn = checkPeer.connect(`${GLOBAL_ROOM_ID}-s0`, { reliable: true });
                    conn.on('open', () => {
                        for (const client of activeClientsMap.values()) {
                            if (client.conn && client.conn.open) {
                                client.conn.send({ type: 'REDIRECT', slot: 0 });
                            }
                        }
                        setTimeout(() => {
                            checkPeer.destroy();
                            handleHostDrop(0, true);
                        }, 500);
                    });
                    conn.on('error', () => { checkPeer.destroy(); });
                    setTimeout(() => { if (!checkPeer.destroyed) checkPeer.destroy(); }, 2000);
                });
                checkPeer.on('error', () => { checkPeer.destroy(); });
            }, 4000);
        }

        myPeer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'HELLO') {
                    const cid = data.clientId;
                    if (!cid) return; 

                    // Оновлюємо дані клієнта перед авто-розподілом
                    if (!activeClientsMap.has(cid)) {
                        activeClientsMap.set(cid, { conn: conn, team: null, lastActivity: Date.now() });
                    } else {
                        const existing = activeClientsMap.get(cid);
                        existing.conn = conn; 
                        existing.lastActivity = Date.now();
                    }

                    // Перевіряємо чи потрібно розширити або звузити ліміт команд
                    if (isAutoTeamLimit) {
                        const totalPlayers = 1 + activeClientsMap.size;
                        const bestLimit = getBestTeamLimit(totalPlayers);
                        if (bestLimit !== activeTeamLimit) {
                            activeTeamLimit = bestLimit;
                            updateHostControlsUI();
                            rebalanceTeamsToLimit();
                        }
                    }
                    
                    const client = activeClientsMap.get(cid);
                    let assignedTeam = client.team;

                    // Якщо в гравця команди немає або вона поза новим лімітом
                    if (!assignedTeam || TEAMS.indexOf(assignedTeam) >= activeTeamLimit) {
                        if (data.teamId) {
                            assignedTeam = TEAMS.find(t => t.id === data.teamId);
                            if (!assignedTeam || TEAMS.indexOf(assignedTeam) >= activeTeamLimit) {
                                assignedTeam = getNextBalancedTeam();
                            }
                        } else {
                            assignedTeam = getNextBalancedTeam();
                        }
                        client.team = assignedTeam;
                    }
                    
                    conn.send({ type: 'TEAM', value: assignedTeam });
                    broadcastCount();
                } 
                else if (data.type === 'PONG') {
                    const cid = data.clientId;
                    if (cid && activeClientsMap.has(cid)) {
                        activeClientsMap.get(cid).lastActivity = Date.now();
                    }
                }
            });

            conn.on('close', () => {
                for (const[cid, clientData] of activeClientsMap.entries()) {
                    if (clientData.conn === conn) {
                        activeClientsMap.delete(cid);
                        broadcastCount();
                        break;
                    }
                }
            });
        });

        hostActivityInterval = setInterval(() => {
            if (!isHost) return;
            const now = Date.now();

            for (const [cid, client] of activeClientsMap.entries()) {
                if (now - client.lastActivity > TIMEOUT_LIMIT) {
                    if (client.conn && client.conn.open) client.conn.close();
                    activeClientsMap.delete(cid);
                }
            }
            
            broadcastCount();
        }, PING_INTERVAL);
    }

    function broadcastCount() {
        if (!isHost) return;

        let totalPlayers = 1 + activeClientsMap.size;
        
        // Автоматичне перемикання при зміні кількості
        if (isAutoTeamLimit) {
            const bestLimit = getBestTeamLimit(totalPlayers);
            if (bestLimit !== activeTeamLimit) {
                activeTeamLimit = bestLimit;
                updateHostControlsUI();
                rebalanceTeamsToLimit();
            }
        }

        // Обчислення точної статистики після можливого ребалансу
        let currentTotal = 1; 
        const teamCounts = { 'red': 0, 'white': 0, 'black': 0, 'blue': 0 };
        
        if (myTeam) teamCounts[myTeam.id]++;
        
        for (const client of activeClientsMap.values()) {
            currentTotal++;
            if (client.team) {
                teamCounts[client.team.id]++;
            }
        }

        updateCount(currentTotal);
        if (myTeam) {
            updateTeamCountUI(teamCounts[myTeam.id]);
        }

        for (const client of activeClientsMap.values()) {
            if (client.conn && client.conn.open) {
                client.conn.send({ 
                    type: 'COUNT', 
                    value: currentTotal, 
                    teamCounts: teamCounts,
                    activeTeamLimit: activeTeamLimit,
                    isAutoTeamLimit: isAutoTeamLimit
                });
            }
        }
    }

    function getNextBalancedTeam() {
        const teamCounts = { 'red': 0, 'white': 0, 'black': 0, 'blue': 0 };
        
        if (myTeam) teamCounts[myTeam.id]++;
        
        for (const client of activeClientsMap.values()) {
            if (client.team) {
                teamCounts[client.team.id]++;
            }
        }

        let minTeam = TEAMS[0];
        let minCount = teamCounts[TEAMS[0].id];

        for (let i = 1; i < activeTeamLimit; i++) {
            if (teamCounts[TEAMS[i].id] < minCount) {
                minTeam = TEAMS[i];
                minCount = teamCounts[TEAMS[i].id];
            }
        }
        return minTeam;
    }

    function rebalanceTeamsToLimit() {
        if (TEAMS.indexOf(myTeam) >= activeTeamLimit) {
            myTeam = getNextBalancedTeam();
            updateTeamUI(myTeam);
        }
        
        for (const[cid, client] of activeClientsMap.entries()) {
            if (TEAMS.indexOf(client.team) >= activeTeamLimit) {
                client.team = getNextBalancedTeam();
                if (client.conn && client.conn.open) {
                    client.conn.send({ type: 'TEAM', value: client.team });
                }
            }
        }
    }

    // Ручне або автоматичне встановлення ліміту
    function setTeamLimit(limit, isAuto = false) {
        if (!isHost) return;
        activeTeamLimit = limit;
        isAutoTeamLimit = isAuto; 
        updateHostControlsUI();
        rebalanceTeamsToLimit();
        broadcastCount();
    }
    
    // Повернення в АВТО режим після ручного оверрайду
    function setAutoMode() {
        if (!isHost) return;
        isAutoTeamLimit = true;
        const totalPlayers = 1 + activeClientsMap.size;
        const bestLimit = getBestTeamLimit(totalPlayers);
        setTeamLimit(bestLimit, true);
    }

    function updateHostControlsUI() {
        document.getElementById('btn-limit-2').className = 'btn-team-limit';
        document.getElementById('btn-limit-3').className = 'btn-team-limit';
        document.getElementById('btn-limit-4').className = 'btn-team-limit';

        const activeBtn = document.getElementById(`btn-limit-${activeTeamLimit}`);
        const autoBadge = document.getElementById('auto-badge');

        if (activeBtn) {
            activeBtn.classList.add('active');
            if (isAutoTeamLimit) {
                activeBtn.classList.add('auto-highlight');
                if (autoBadge) autoBadge.classList.remove('inactive');
            } else {
                if (autoBadge) autoBadge.classList.add('inactive');
            }
        }
    }

    // ==========================================
    // ЛОГІКА КЛІЄНТА
    // ==========================================
    function setupClientLogic() {
        isReconnecting = false;
        document.getElementById('host-controls').style.display = 'none';
        updateStatus("Онлайн", "client");
        lastHostActivity = Date.now();
        
        hostConnection.send({ 
            type: 'HELLO', 
            clientId: MY_CLIENT_ID,
            teamId: myTeam ? myTeam.id : null 
        });
        
        clearInterval(clientActivityInterval);
        
        hostConnection.on('data', (data) => {
            lastHostActivity = Date.now();

            if (data.type === 'COUNT') {
                updateCount(data.value);
                if (data.teamCounts && myTeam) {
                    updateTeamCountUI(data.teamCounts[myTeam.id]);
                }
                
                // Синхронізуємо стан хоста (щоб зберегти ручний вибір у разі зміни хоста)
                if (data.isAutoTeamLimit !== undefined) {
                    isAutoTeamLimit = data.isAutoTeamLimit;
                }
                if (data.activeTeamLimit !== undefined && data.activeTeamLimit !== activeTeamLimit) {
                    activeTeamLimit = data.activeTeamLimit;
                    updateHostControlsUI(); 
                }
            } else if (data.type === 'TEAM') {
                myTeam = data.value;
                updateTeamUI(myTeam);
            } else if (data.type === 'REDIRECT') {
                handleHostDrop(data.slot, true);
            }
        });

        clientActivityInterval = setInterval(() => {
            if (Date.now() - lastHostActivity > TIMEOUT_LIMIT) {
                handleHostDrop(0); 
            } else if (hostConnection && hostConnection.open) {
                hostConnection.send({ type: 'PONG', clientId: MY_CLIENT_ID });
            }
        }, PING_INTERVAL);

        hostConnection.on('close', () => handleHostDrop(0, true));
        hostConnection.on('error', () => handleHostDrop(0));
    }

    function handleHostDrop(targetSlot = 0, immediate = false) {
        if (isReconnecting) return;
        isReconnecting = true;

        clearInterval(clientActivityInterval);
        clearInterval(hostActivityInterval);
        clearInterval(mergeInterval);
        updateStatus("Оновлення...", "loading");
        
        if (hostConnection) {
            hostConnection.close();
            hostConnection = null;
        }
        if (myPeer) {
            myPeer.destroy();
            myPeer = null;
        }

        const backoff = immediate ? 100 : Math.floor(Math.random() * 800) + 200;
        setTimeout(() => {
            isReconnecting = false;
            initNetwork(targetSlot); 
        }, backoff);
    }

    // ==========================================
    // UI ФУНКЦІЇ
    // ==========================================
    function updateCount(newCount) {
        if (newCount !== currentCount) {
            currentCount = newCount;
            const counterEl = document.getElementById('counter');
            const boxEl = document.getElementById('counter-box');
            
            counterEl.innerText = currentCount;
            
            boxEl.classList.remove('pulse');
            void boxEl.offsetWidth; 
            boxEl.classList.add('pulse');
            setTimeout(() => boxEl.classList.remove('pulse'), 300);
        }
    }

    function updateTeamCountUI(count) {
        const teamCounterEl = document.getElementById('team-counter');
        if (teamCounterEl) {
            teamCounterEl.innerText = count > 0 ? count : 1;
        }
    }

    function updateTeamUI(team) {
        if (!team) return;
        const container = document.getElementById('team-container');
        const nameEl = document.getElementById('team-name');
        
        container.style.display = 'flex';
        container.style.backgroundColor = team.bg;
        container.style.color = team.color;
        
        if (team.border) {
            container.style.border = team.border;
        } else {
            container.style.border = '2px solid transparent';
        }
        
        nameEl.innerText = team.name;
    }

    function updateStatus(text, type) {
        const badge = document.getElementById('status-badge');
        const span = document.getElementById('status-text');
        
        badge.className = '';
        span.innerText = text;

        if (type === 'loading') {
            badge.innerHTML = `<i data-lucide="loader-2" style="animation: spin 1s linear infinite;"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'host') {
            badge.classList.add('status-host');
            badge.innerHTML = `<i data-lucide="server"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'client') {
            badge.classList.add('status-client');
            badge.innerHTML = `<i data-lucide="wifi"></i> <span id="status-text">${text}</span>`;
        } else if (type === 'error') {
            badge.classList.add('status-error');
            badge.innerHTML = `<i data-lucide="alert-triangle"></i> <span id="status-text">${text}</span>`;
        }
        lucide.createIcons();
    }

    async function shareLink() {
        const link = window.location.href;
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Live Counter',
                    text: 'Приєднуйся до моєї кімнати!',
                    url: link
                });
            } catch (err) { }
        } else {
            navigator.clipboard.writeText(link);
            const btn = document.querySelector('.btn-primary');
            const origHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check"></i> СКОПІЙОВАНО`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = origHtml;
                lucide.createIcons();
            }, 2000);
        }
    }
</script>
